name: Pendle APY 알람

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행
  workflow_dispatch:         # 수동 실행

permissions:
  contents: write            # 상태 파일 git 커밋용

jobs:
  pendle-alarm:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 3.11 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Pendle APY 체크 실행
        run: |
          python - <<'EOF'
          from pendle_alarm import check
          check()
          EOF

      - name: 상태 파일 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pendle_state.json strc_apy_model.json
          git diff --staged --quiet || (
            git commit -m "chore: update pendle_state" &&
            git pull --rebase origin main &&
            git push
          ) || echo "[경고] 상태 파일 push 실패 (동시 실행 충돌 가능)"
