name: Pendle APY 알람

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행
  workflow_dispatch:         # 수동 실행

jobs:
  pendle-alarm:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 3.11 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: APY 상태 캐시 복원
        uses: actions/cache@v4
        with:
          path: pendle_state.json
          key: pendle-state-${{ github.run_id }}
          restore-keys: |
            pendle-state-

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Pendle APY 체크 실행
        run: |
          python - <<'EOF'
          from pendle_alarm import check
          check()
          EOF
